{% extends 'base.html' %}
{% load static %}

{% block title %}Редактиране на профил{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Редактиране на профил</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Потребителски данни</h2>
        {{ user_form.as_p }}
        <h2>Профилни данни</h2>
        {{ profile_form.as_p }}
        <button type="submit" class="btn btn-success">Запази</button>
        <a href="{% url 'profile' %}" class="btn btn-secondary">Отказ</a>
    </form>
</div>
{% endblock %}
