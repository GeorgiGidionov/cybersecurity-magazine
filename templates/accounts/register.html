{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Регистрация</button>
    </form>
    <p class="mt-3">Вече имате акаунт? <a href="{% url 'login' %}">Вход</a></p>
</div>
{% endblock %}
