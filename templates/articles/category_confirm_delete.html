{% extends 'base.html' %}
{% block title %}Изтриване на категория{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <p>Сигурни ли сте, че искате да изтриете категорията <strong>{{ object.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, изтрий</button>
            <a href="{% url 'category_list' %}" class="btn btn-secondary">Отказ</a>
        </form>
    </div>
</div>
{% endblock %}
