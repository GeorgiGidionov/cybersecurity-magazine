{% extends 'base.html' %}
{% block title %}{% if form.instance.pk %}Редактиране на автор{% else %}Нов автор{% endif %}{% endblock %}
{% block content %}
<div class="container mt-4">
    <h1>{% if form.instance.pk %}Редактиране на автор{% else %}Нов автор{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Запази</button>
        <a href="{% url 'author_list' %}" class="btn btn-secondary">Отказ</a>
    </form>
</div>
{% endblock %}
