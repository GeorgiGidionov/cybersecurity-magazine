{% extends 'base.html' %}
{% load static %}

{% block title %}Изтриване на коментар{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h4>Потвърждение</h4>
        <p>Сигурни ли сте, че искате да изтриете коментара на <strong>{{ object.author_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, изтрий</button>
            <a href="{% url 'comment_list' %}" class="btn btn-secondary">Отказ</a>
        </form>
    </div>
</div>
{% endblock %}
