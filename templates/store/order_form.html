{% extends 'base.html' %}
{% load static %}

{% block title %}Поръчка - Cybersecurity Magazine{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Поръчай продукт</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Поръчай</button>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Отказ</a>
    </form>
</div>
{% endblock %}
